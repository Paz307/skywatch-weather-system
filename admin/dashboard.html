<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — SkyWatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --gold:#f5c842; --sky:#1a6fa8; --sky-light:#3db2ff;
      --dark:#0b1e30; --dark2:#112030; --dark3:#162840;
      --glass:rgba(255,255,255,0.07); --glass-border:rgba(255,255,255,0.15);
      --text:#e8f4ff; --muted:rgba(232,244,255,0.55);
      --red:#e74c3c; --green:#2ecc71;
    }
    body {
      min-height:100vh; font-family:'Lato',sans-serif; color:var(--text);
      background: url('../images/bg.png') center/cover no-repeat fixed;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background:rgba(11,30,48,0.88); z-index:0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position:fixed; left:0; top:0; bottom:0; width:240px;
      background:rgba(11,30,48,0.95);
      border-right:1px solid var(--glass-border);
      z-index:50; padding:0;
      backdrop-filter:blur(20px);
      display:flex; flex-direction:column;
    }
    .sidebar-brand {
      padding:28px 24px 20px;
      border-bottom:1px solid var(--glass-border);
    }
    .sidebar-brand h2 {
      font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--gold);
    }
    .sidebar-brand p { font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:2px; }
    .sidebar-nav { flex:1; padding:20px 0; }
    .nav-item {
      display:flex; align-items:center; gap:12px;
      padding:13px 24px; cursor:pointer;
      font-size:0.88rem; letter-spacing:0.5px;
      color:var(--muted); transition:all 0.25s;
      border-left:3px solid transparent;
      text-decoration:none;
    }
    .nav-item:hover, .nav-item.active {
      color:var(--text); border-left-color:var(--gold);
      background:rgba(245,200,66,0.08);
    }
    .nav-item .icon { font-size:1.1rem; width:22px; text-align:center; }
    .sidebar-footer { padding:20px 24px; border-top:1px solid var(--glass-border); }
    .logout-btn {
      width:100%; padding:11px; border:1px solid rgba(231,76,60,0.4);
      background:rgba(231,76,60,0.12); color:#ff8a80;
      border-radius:10px; cursor:pointer; font-family:'Lato',sans-serif;
      font-size:0.85rem; letter-spacing:1px; text-transform:uppercase;
      transition:all 0.3s;
    }
    .logout-btn:hover { background:rgba(231,76,60,0.3); }

    /* ── MAIN ── */
    .main {
      margin-left:240px; position:relative; z-index:1;
      min-height:100vh;
    }
    .topbar {
      padding:20px 36px;
      background:rgba(11,30,48,0.7);
      border-bottom:1px solid var(--glass-border);
      backdrop-filter:blur(14px);
      display:flex; align-items:center; justify-content:space-between;
    }
    .topbar h1 { font-family:'Playfair Display',serif; font-size:1.6rem; }
    .topbar .badge {
      background:rgba(245,200,66,0.15); border:1px solid rgba(245,200,66,0.3);
      color:var(--gold); padding:6px 14px; border-radius:50px; font-size:0.8rem; letter-spacing:1px;
    }
    .content { padding:32px 36px; }

    /* ── SECTIONS ── */
    .section { display:none; animation:fadeUp 0.5s ease both; }
    .section.active { display:block; }

    /* ── STAT CARDS ── */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:20px; margin-bottom:32px; }
    .stat-card {
      background:var(--glass); border:1px solid var(--glass-border);
      backdrop-filter:blur(16px); border-radius:18px; padding:24px 22px;
      transition:all 0.3s;
    }
    .stat-card:hover { transform:translateY(-3px); background:rgba(255,255,255,0.11); }
    .stat-card .sc-label { font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
    .stat-card .sc-value {
      font-family:'Playfair Display',serif; font-size:2.4rem; font-weight:900;
      color:var(--gold); margin:6px 0 2px;
    }
    .stat-card .sc-sub { font-size:0.8rem; color:var(--muted); }
    .stat-card .sc-icon { font-size:1.8rem; margin-bottom:10px; }

    /* ── TABLE ── */
    .card {
      background:var(--glass); border:1px solid var(--glass-border);
      backdrop-filter:blur(16px); border-radius:18px; overflow:hidden;
      margin-bottom:24px;
    }
    .card-header {
      padding:20px 24px; border-bottom:1px solid var(--glass-border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .card-header h3 { font-family:'Playfair Display',serif; font-size:1.1rem; }
    .clear-btn {
      padding:7px 16px; border:1px solid rgba(231,76,60,0.4);
      background:rgba(231,76,60,0.12); color:#ff8a80;
      border-radius:8px; cursor:pointer; font-size:0.8rem; letter-spacing:1px;
      transition:all 0.3s; font-family:'Lato',sans-serif;
    }
    .clear-btn:hover { background:rgba(231,76,60,0.3); }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:rgba(0,0,0,0.2); }
    th { padding:12px 18px; text-align:left; font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-weight:700; }
    td { padding:13px 18px; font-size:0.88rem; border-top:1px solid var(--glass-border); }
    tr:hover td { background:rgba(255,255,255,0.04); }
    .badge-cond {
      display:inline-block; padding:3px 10px;
      background:rgba(61,178,255,0.15); border:1px solid rgba(61,178,255,0.3);
      border-radius:50px; font-size:0.78rem; color:var(--sky-light);
      text-transform:capitalize;
    }
    .empty-state { padding:40px; text-align:center; color:var(--muted); }
    .empty-state .em-icon { font-size:3rem; margin-bottom:12px; }

    /* ── CHART BAR ── */
    .mini-chart { padding:24px; }
    .bar-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .bar-label { width:100px; font-size:0.82rem; color:var(--muted); text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bar-track { flex:1; height:10px; background:rgba(255,255,255,0.08); border-radius:999px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,var(--sky),var(--gold)); transition:width 0.8s ease; }
    .bar-count { width:30px; font-size:0.8rem; color:var(--gold); font-weight:700; }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:28px; right:28px; z-index:999;
      background:#27ae60; color:#fff; padding:12px 24px; border-radius:50px;
      font-size:0.87rem; font-weight:700; box-shadow:0 8px 24px rgba(0,0,0,0.3);
      transform:translateY(80px); opacity:0; transition:all 0.4s;
    }
    .toast.show { transform:translateY(0); opacity:1; }

    /* ── LIGHT THEME (header/sidebar/topbar only) ── */
    body.theme-light .sidebar {
      background:rgba(255,255,255,0.92);
      border-right:1px solid rgba(11,30,48,0.1);
      color:var(--dark);
    }
    body.theme-light .sidebar-brand { border-bottom:1px solid rgba(11,30,48,0.1); }
    body.theme-light .sidebar-brand h2 { color:#c9970c; }
    body.theme-light .sidebar-brand p { color:rgba(11,30,48,0.5); }
    body.theme-light .nav-item { color:rgba(11,30,48,0.6); }
    body.theme-light .nav-item:hover, body.theme-light .nav-item.active {
      color:var(--dark); background:rgba(245,200,66,0.15);
    }
    body.theme-light .sidebar-footer { border-top:1px solid rgba(11,30,48,0.1); }
    body.theme-light .topbar {
      background:rgba(255,255,255,0.85);
      border-bottom:1px solid rgba(11,30,48,0.1);
      color:var(--dark);
    }
    body.theme-light .topbar h1 { color:var(--dark); }
    body.theme-light .topbar .badge { color:#a87900; }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      display:flex; align-items:center; gap:10px;
    }
    .theme-toggle-btn {
      width:42px; height:42px; border-radius:50%;
      border:1px solid var(--glass-border); background:var(--glass);
      cursor:pointer; font-size:1.1rem; display:flex;
      align-items:center; justify-content:center;
      transition:all 0.3s;
    }
    .theme-toggle-btn:hover { background:rgba(255,255,255,0.15); transform:translateY(-2px); }

    /* ── SETTINGS FORM ── */
    .settings-form { padding:24px; max-width:480px; }
    .settings-form .field { margin-bottom:18px; }
    .settings-form label {
      display:block; font-size:0.78rem; letter-spacing:2px; text-transform:uppercase;
      color:var(--muted); margin-bottom:6px;
    }
    .settings-form input {
      width:100%; padding:13px 16px;
      background:rgba(255,255,255,0.08);
      border:1px solid var(--glass-border);
      border-radius:10px; color:var(--text);
      font-family:'Lato',sans-serif; font-size:0.95rem; outline:none;
      transition:all 0.3s;
    }
    body.theme-light .settings-form input {
      background:rgba(11,30,48,0.05); color:var(--dark);
      border:1px solid rgba(11,30,48,0.15);
    }
    .settings-form input:focus {
      border-color:var(--gold); box-shadow:0 0 0 3px rgba(245,200,66,0.2);
    }
    .settings-form .save-btn {
      padding:12px 28px; border:none; cursor:pointer; border-radius:10px;
      background:linear-gradient(135deg,var(--gold),#e8a400);
      color:var(--dark); font-family:'Playfair Display',serif;
      font-size:0.95rem; font-weight:700; letter-spacing:1px;
      transition:all 0.3s; margin-top:6px;
    }
    .settings-form .save-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(245,200,66,0.4); }
    .settings-divider { height:1px; background:var(--glass-border); margin:28px 0; }
    .settings-form h4 {
      font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:16px; color:var(--gold);
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @media(max-width:768px) {
      .sidebar { width:100%; position:relative; height:auto; }
      .main { margin-left:0; }
      .content { padding:20px; }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <h2>SkyWatch</h2>
    <p>Admin Panel</p>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item active" onclick="showSection('overview')" href="#">
      <span class="icon">📊</span> Overview
    </a>
    <a class="nav-item" onclick="showSection('history')" href="#">
      <span class="icon">🕐</span> Search History
    </a>
    <a class="nav-item" onclick="showSection('stats')" href="#">
      <span class="icon">📈</span> Usage Stats
    </a>
    <a class="nav-item" onclick="showSection('manage')" href="#">
      <span class="icon">🗂️</span> Manage Records
    </a>
    <a class="nav-item" onclick="showSection('settings')" href="#">
      <span class="icon">⚙️</span> Settings
    </a>
    <a class="nav-item" href="../index.html">
      <span class="icon">🌍</span> Weather Search
    </a>
  </nav>
  <div class="sidebar-footer">
    <button class="logout-btn" onclick="logout()">🔒 Logout</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>Dashboard</h1>
    <div class="theme-toggle">
      <button class="theme-toggle-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <span class="badge" id="admin-badge">👤 admin</span>
    </div>
  </div>

  <div class="content">

    <!-- OVERVIEW -->
    <div id="section-overview" class="section active">
      <div class="stats-row" id="stats-row"></div>
      <div class="card">
        <div class="card-header"><h3>Recent Searches</h3></div>
        <div id="recent-table"></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="section-history" class="section">
      <div class="card">
        <div class="card-header">
          <h3>Full Search History</h3>
          <button class="clear-btn" onclick="clearHistory()">🗑 Clear All</button>
        </div>
        <div id="history-table"></div>
      </div>
    </div>

    <!-- USAGE STATS -->
    <div id="section-stats" class="section">
      <div class="stats-row" id="usage-stats-row"></div>
      <div class="card">
        <div class="card-header"><h3>Top Searched Cities</h3></div>
        <div class="mini-chart" id="top-cities-chart"></div>
      </div>
    </div>

    <!-- MANAGE -->
    <div id="section-manage" class="section">
      <div class="card">
        <div class="card-header">
          <h3>Stored Records</h3>
          <button class="clear-btn" onclick="clearAll()">🗑 Delete All Records</button>
        </div>
        <div id="manage-table"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="section-settings" class="section">
      <div class="card">
        <div class="card-header"><h3>Account Settings</h3></div>
        <div class="settings-form">
          <h4>Change Username</h4>
          <div class="field">
            <label for="new-username">New Username</label>
            <input type="text" id="new-username" placeholder="Enter new username"/>
          </div>
          <button class="save-btn" onclick="changeUsername()">Update Username</button>

          <div class="settings-divider"></div>

          <h4>Change Password</h4>
          <div class="field">
            <label for="current-password">Current Password</label>
            <input type="password" id="current-password" placeholder="Enter current password"/>
          </div>
          <div class="field">
            <label for="new-password">New Password</label>
            <input type="password" id="new-password" placeholder="Enter new password"/>
          </div>
          <div class="field">
            <label for="confirm-password">Confirm New Password</label>
            <input type="password" id="confirm-password" placeholder="Confirm new password"/>
          </div>
          <button class="save-btn" onclick="changePassword()">Update Password</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Auth guard
  if (!localStorage.getItem('adminLoggedIn')) {
    window.location.href = 'login.html';
  }

  function logout() {
    localStorage.removeItem('adminLoggedIn');
    window.location.href = 'login.html';
  }

  // ── THEME ──
  function applyTheme(theme) {
    document.body.classList.toggle('theme-light', theme === 'light');
    document.getElementById('theme-toggle-btn').textContent = theme === 'light' ? '☀️' : '🌙';
  }

  function toggleTheme() {
    const current = localStorage.getItem('adminTheme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('adminTheme', next);
    applyTheme(next);
  }

  applyTheme(localStorage.getItem('adminTheme') || 'dark');

  // ── ACCOUNT ──
  function getAdmin() {
    return JSON.parse(localStorage.getItem('adminUser') || '{"username":"admin","password":"admin123"}');
  }

  function updateAdminBadge() {
    document.getElementById('admin-badge').textContent = '👤 ' + getAdmin().username;
  }

  function changeUsername() {
    const newUsername = document.getElementById('new-username').value.trim();
    if (!newUsername) {
      showToast('Please enter a username.');
      return;
    }
    const admin = getAdmin();
    admin.username = newUsername;
    localStorage.setItem('adminUser', JSON.stringify(admin));
    document.getElementById('new-username').value = '';
    updateAdminBadge();
    showToast('Username updated successfully.');
  }

  function changePassword() {
    const current = document.getElementById('current-password').value;
    const next = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const admin = getAdmin();

    if (current !== admin.password) {
      showToast('Current password is incorrect.');
      return;
    }
    if (!next || next.length < 4) {
      showToast('New password must be at least 4 characters.');
      return;
    }
    if (next !== confirm) {
      showToast('New passwords do not match.');
      return;
    }
    admin.password = next;
    localStorage.setItem('adminUser', JSON.stringify(admin));
    document.getElementById('current-password').value = '';
    document.getElementById('new-password').value = '';
    document.getElementById('confirm-password').value = '';
    showToast('Password updated successfully.');
  }

  function showSection(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('section-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
    renderAll();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function getHistory() {
    return JSON.parse(localStorage.getItem('searchHistory') || '[]');
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleString('en-US', {
      month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
    });
  }

  function buildTable(rows, showDelete) {
    if (!rows.length) {
      return `<div class="empty-state"><div class="em-icon">🌤️</div><p>No search records yet.</p></div>`;
    }
    let html = `<table><thead><tr>
      <th>#</th><th>Query</th><th>City</th><th>Country</th>
      <th>Temp</th><th>Condition</th><th>Time</th>
      ${showDelete ? '<th>Action</th>' : ''}
    </tr></thead><tbody>`;
    rows.forEach((r, i) => {
      html += `<tr>
        <td style="color:var(--muted)">${i+1}</td>
        <td>${r.query || '—'}</td>
        <td><strong>${r.city}</strong></td>
        <td>${r.country}</td>
        <td style="color:var(--gold);font-weight:700">${r.temp}°C</td>
        <td><span class="badge-cond">${r.condition}</span></td>
        <td style="color:var(--muted)">${formatTime(r.time)}</td>
        ${showDelete ? `<td><button onclick="deleteRecord(${i})" style="background:rgba(231,76,60,0.2);border:1px solid rgba(231,76,60,0.4);color:#ff8a80;padding:4px 12px;border-radius:8px;cursor:pointer;font-size:0.78rem;">Delete</button></td>` : ''}
      </tr>`;
    });
    html += '</tbody></table>';
    return html;
  }

  function renderOverview() {
    const h = getHistory();
    const count = parseInt(localStorage.getItem('searchCount') || '0');
    const unique = [...new Set(h.map(x => x.city))].length;
    const latest = h[0] ? h[0].city : '—';
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="sc-icon">🔍</div><div class="sc-label">Total Searches</div><div class="sc-value">${count}</div><div class="sc-sub">all time</div></div>
      <div class="stat-card"><div class="sc-icon">🌆</div><div class="sc-label">Unique Cities</div><div class="sc-value">${unique}</div><div class="sc-sub">searched</div></div>
      <div class="stat-card"><div class="sc-icon">📍</div><div class="sc-label">Last Search</div><div class="sc-value" style="font-size:1.3rem;margin-top:8px">${latest}</div><div class="sc-sub">${h[0] ? formatTime(h[0].time) : '—'}</div></div>
      <div class="stat-card"><div class="sc-icon">🗃️</div><div class="sc-label">Records Stored</div><div class="sc-value">${h.length}</div><div class="sc-sub">in history</div></div>
    `;
    document.getElementById('recent-table').innerHTML = buildTable(h.slice(0, 10), false);
  }

  function renderHistory() {
    const h = getHistory();
    document.getElementById('history-table').innerHTML = buildTable(h, false);
  }

  function renderUsageStats() {
    const h = getHistory();
    const count = parseInt(localStorage.getItem('searchCount') || '0');
    const cityCount = {};
    h.forEach(r => { cityCount[r.city] = (cityCount[r.city] || 0) + 1; });
    const sorted = Object.entries(cityCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const maxC = sorted[0] ? sorted[0][1] : 1;

    document.getElementById('usage-stats-row').innerHTML = `
      <div class="stat-card"><div class="sc-icon">📊</div><div class="sc-label">Total Searches</div><div class="sc-value">${count}</div></div>
      <div class="stat-card"><div class="sc-icon">🏙️</div><div class="sc-label">Cities Searched</div><div class="sc-value">${Object.keys(cityCount).length}</div></div>
      <div class="stat-card"><div class="sc-icon">🏆</div><div class="sc-label">Most Searched</div><div class="sc-value" style="font-size:1.2rem;margin-top:8px">${sorted[0] ? sorted[0][0] : '—'}</div><div class="sc-sub">${sorted[0] ? sorted[0][1] + ' searches' : ''}</div></div>
    `;

    if (!sorted.length) {
      document.getElementById('top-cities-chart').innerHTML = '<div class="empty-state"><div class="em-icon">📊</div><p>No data yet.</p></div>';
      return;
    }
    let chart = '';
    sorted.forEach(([city, cnt]) => {
      const pct = Math.round((cnt / maxC) * 100);
      chart += `<div class="bar-row">
        <div class="bar-label">${city}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-count">${cnt}</div>
      </div>`;
    });
    document.getElementById('top-cities-chart').innerHTML = chart;
  }

  function renderManage() {
    const h = getHistory();
    document.getElementById('manage-table').innerHTML = buildTable(h, true);
  }

  function deleteRecord(i) {
    let h = getHistory();
    h.splice(i, 1);
    localStorage.setItem('searchHistory', JSON.stringify(h));
    showToast('Record deleted.');
    renderAll();
  }

  function clearHistory() {
    if (!confirm('Clear all search history?')) return;
    localStorage.setItem('searchHistory', '[]');
    showToast('History cleared.');
    renderAll();
  }

  function clearAll() {
    if (!confirm('Delete ALL records? This cannot be undone.')) return;
    localStorage.setItem('searchHistory', '[]');
    localStorage.setItem('searchCount', '0');
    showToast('All records deleted.');
    renderAll();
  }
